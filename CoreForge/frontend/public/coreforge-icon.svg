<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>

    <filter id="bloom" x="-60%" y="-60%" width="220%" height="220%" color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceGraphic" stdDeviation="18" result="blurred"/>
      <feMerge>
        <feMergeNode in="blurred"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="innerGlow" x="-50%" y="-50%" width="200%" height="200%" color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blurred"/>
      <feMerge>
        <feMergeNode in="blurred"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <linearGradient id="flameGrad" x1="20%" y1="100%" x2="40%" y2="0%">
      <stop offset="0%"   stop-color="#6e1e06"/>
      <stop offset="22%"  stop-color="#b83e12"/>
      <stop offset="50%"  stop-color="#d4622a"/>
      <stop offset="76%"  stop-color="#d4a855"/>
      <stop offset="100%" stop-color="#f0ddb0"/>
    </linearGradient>

    <linearGradient id="highlightGrad" x1="30%" y1="100%" x2="50%" y2="0%">
      <stop offset="0%"   stop-color="#d4622a" stop-opacity="0"/>
      <stop offset="35%"  stop-color="#e08840" stop-opacity="0.7"/>
      <stop offset="75%"  stop-color="#f0ddb0" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#faf3e8"  stop-opacity="0.60"/>
    </linearGradient>

    <radialGradient id="bgGrad" cx="50%" cy="38%" r="58%">
      <stop offset="0%"   stop-color="#0e2624"/>
      <stop offset="100%" stop-color="#040d0c"/>
    </radialGradient>

    <radialGradient id="haze" cx="50%" cy="62%" r="44%">
      <stop offset="0%"   stop-color="#c04515" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#c04515" stop-opacity="0"/>
    </radialGradient>

  </defs>

  <rect width="512" height="512" rx="88" fill="url(#bgGrad)"/>

  <ellipse cx="256" cy="310" rx="140" ry="150" fill="url(#haze)"/>

  <path
    d="M 258 142
       C 295 166, 342 218, 338 276
       C 334 326, 312 358, 256 366
       C 200 358, 178 326, 174 276
       C 170 218, 220 166, 258 142
       Z"
    fill="url(#flameGrad)"
    filter="url(#bloom)"/>

  <path
    d="M 258 192
       C 278 212, 308 248, 308 284
       C 308 314, 292 342, 256 348
       C 222 342, 208 314, 210 284
       C 212 250, 238 212, 258 192
       Z"
    fill="url(#highlightGrad)"
    filter="url(#innerGlow)"/>

  <circle cx="257" cy="145" r="7" fill="#f8eed4" opacity="0.65" filter="url(#innerGlow)"/>

</svg>
