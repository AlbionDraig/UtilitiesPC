<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!--
    CoreForge — performance profile gauge
    Material Design style, free-floating (no background shape).
    Gauge spans 270° (7:30 → 4:30 via 12 o'clock).
    Needle at ~70%: "high-performance mode active".
    4 tick marks = 4 profiles (Trabajo, Trabajo Dev, Gamer, Gamer Agresivo).
    Palette from wallpaper: deep teal track + warm orange active arc + sandy needle.
  -->
  <defs>

    <!-- Glow for the active arc -->
    <filter id="arcGlow" x="-30%" y="-30%" width="160%" height="160%" color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceGraphic" stdDeviation="7" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Glow for the needle -->
    <filter id="needleGlow" x="-60%" y="-60%" width="220%" height="220%" color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Drop shadow to keep the icon readable over light backgrounds -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="10" flood-color="#000000" flood-opacity="0.45"/>
    </filter>

  </defs>

  <!--
    ══ GAUGE GEOMETRY ══════════════════════════════════════════════
    Center  : (256, 268)
    Radius  : 155 px
    Arc     : SVG 135° → SVG 45°, large-arc clockwise (270° span)
    Key SVG angles (measured from positive X axis, clockwise):
      7:30 pos (start)  : 135°  → point (146, 378)
      12 o'clock (50%)  : 270°  → point (256, 113)
      70% mark          : 324°  → point (381, 177)
      4:30 pos (end)    : 45°   → point (366, 378)
    ════════════════════════════════════════════════════════════════
  -->

  <!-- ── Background drop shadow group ── -->
  <g filter="url(#shadow)">

    <!-- Track arc (full 270°, dark navy) -->
    <path d="M 146 378 A 155 155 0 1 1 366 378"
      fill="none" stroke="#0d2b4e" stroke-width="22"
      stroke-linecap="round" opacity="0.90"/>

    <!-- Active arc (70% = 189°, warm orange) -->
    <!-- 70% × 270° = 189° from SVG 135° → ends at SVG 324°            -->
    <!-- cos324°=0.809 sin324°=-0.588 → (256+125, 268-91) = (381,177)  -->
    <!-- 189° > 180° → large-arc-flag = 1                               -->
    <path d="M 146 378 A 155 155 0 1 1 381 177"
      fill="none" stroke="#FF6D00" stroke-width="22"
      stroke-linecap="round"
      filter="url(#arcGlow)"/>

    <!-- Thin inner ring — depth detail (Material elevation) -->
    <path d="M 185 339 A 100 100 0 1 1 327 339"
      fill="none" stroke="#1565C0" stroke-width="2"
      stroke-linecap="round" opacity="0.40"/>

  </g>

  <!-- ── Tick marks — 4 profiles ── -->
  <!-- Radial lines from r=161 to r=177, at 0% / 33% / 66% / 100%  -->
  <g stroke="#90CAF9" stroke-width="3.5" stroke-linecap="round" opacity="0.90">
    <!-- 0%  SVG 135°: unit(-0.707, 0.707) inner(146,378) outer(133,390) -->
    <line x1="146" y1="378" x2="133" y2="390"/>
    <!-- 33% SVG 224°: unit(-0.719,-0.695) inner(145,161) outer(133,150) -->
    <line x1="145" y1="161" x2="133" y2="150"/>
    <!-- 66% SVG 313°: unit(0.682,-0.731) inner(362,155) outer(374,143) -->
    <line x1="362" y1="155" x2="374" y2="143"/>
    <!-- 100% SVG 45°: unit(0.707,0.707) inner(366,378) outer(379,390) -->
    <line x1="366" y1="378" x2="379" y2="390"/>
  </g>

  <!-- ── Needle ── -->
  <!-- Direction SVG 324°: (0.809, -0.588)                               -->
  <!-- Tip   r=142: (256+115, 268-83) = (371, 185)                       -->
  <!-- Tail  r= 30 opposite: (256-24, 268+18) = (232, 286)               -->
  <line x1="232" y1="286" x2="371" y2="185"
    stroke="#FFFFFF" stroke-width="5" stroke-linecap="round"
    filter="url(#needleGlow)"/>

  <!-- ── Center pivot ── -->
  <circle cx="256" cy="268" r="14" fill="#FF6D00" filter="url(#arcGlow)"/>
  <circle cx="256" cy="268" r="7"  fill="#FFFFFF"/>

</svg>
