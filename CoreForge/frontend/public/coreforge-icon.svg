<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>

    <!-- Wide soft halo — gives presence on any background -->
    <filter id="halo" x="-55%" y="-45%" width="210%" height="190%" color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceGraphic" stdDeviation="22"/>
    </filter>

    <!-- Inner bloom for the core highlight -->
    <filter id="coreBloom" x="-45%" y="-45%" width="190%" height="190%" color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceGraphic" stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Main flame: deep rust base -> orange -> warm gold -> sandy white tip -->
    <linearGradient id="flameGrad" x1="15%" y1="98%" x2="55%" y2="2%">
      <stop offset="0%"   stop-color="#6e1e06"/>
      <stop offset="20%"  stop-color="#b83e12"/>
      <stop offset="48%"  stop-color="#d4622a"/>
      <stop offset="74%"  stop-color="#d4a855"/>
      <stop offset="100%" stop-color="#f0ddb0"/>
    </linearGradient>

    <!-- Inner core: lighter, hotter center of the flame -->
    <linearGradient id="coreGrad" x1="25%" y1="95%" x2="55%" y2="5%">
      <stop offset="0%"   stop-color="#d4622a" stop-opacity="0"/>
      <stop offset="30%"  stop-color="#e08840" stop-opacity="0.72"/>
      <stop offset="72%"  stop-color="#f0ddb0" stop-opacity="0.88"/>
      <stop offset="100%" stop-color="#faf3e8"  stop-opacity="0.65"/>
    </linearGradient>

  </defs>

  <!--
    The flame shape:
      Tip  : (255, 78)  — slightly left of center, organic feel
      Belly: widens to ~168 px at y≈268 (below mid-height)
      Base : rounds gently to (256, 406)
      Slight rightward expansion on the descending side gives
      a natural leaning-flame look, not a rigid teardrop.
  -->

  <!-- Outer warm halo (very soft, low opacity) -->
  <path
    d="M 255 78
       C 318 112, 355 195, 345 268
       C 338 318, 312 366, 256 402
       C 200 366, 174 316, 168 266
       C 160 192, 196 110, 255 78 Z"
    fill="#c04515" opacity="0.30"
    filter="url(#halo)"/>

  <!-- Main flame body -->
  <path
    d="M 255 78
       C 318 112, 355 195, 345 268
       C 338 318, 312 366, 256 402
       C 200 366, 174 316, 168 266
       C 160 192, 196 110, 255 78 Z"
    fill="url(#flameGrad)"/>

  <!-- Inner core highlight -->
  <path
    d="M 255 148
       C 294 172, 318 220, 314 272
       C 310 310, 290 342, 255 356
       C 220 342, 202 310, 200 272
       C 198 222, 220 172, 255 148 Z"
    fill="url(#coreGrad)"
    filter="url(#coreBloom)"/>

  <!-- Tip spark -->
  <circle cx="255" cy="81" r="8" fill="#f8eed4" opacity="0.60"
    filter="url(#coreBloom)"/>

</svg>
